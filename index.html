<!DOCTYPE html>
<html lang="en">
<head>

  <!-- SEO -->

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Marco Vargas",

    "email": "mail@marcovargas.pt"

  <style>
    @font-face {
      font-family: 'Nimbus Sans L';
      src:
        local('Nimbus Sans L Regular'),
        local('Nimbus Sans L'),
        url('./NimbusSansL-Reg.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      --page-offset: clamp(32px, 9vw, 160px);

      background: #fff;
      color: #000;
      min-height: 100dvh;
      padding: var(--page-offset) 28px 40px var(--page-offset);
      font-family: 'Nimbus Sans L', 'Nimbus Sans', Helvetica, Arial, sans-serif;
      font-size: 18px;
      line-height: 1.45;
      font-weight: 400;
      -webkit-font-smoothing: auto;
      -moz-osx-font-smoothing: auto;
    }

    main {
      width: min(100%, 460px);
      text-align: left;
    }

    h1,
    p {
      font-size: inherit;
      line-height: inherit;
      font-weight: 400;
      color: #000;
    }

    h1 {
      margin-bottom: 1px;
    }

    .details {
      display: grid;
      gap: 0;
    }

    .contact {
      margin-top: 1px;
    }

    a {
      color: #000;
      text-decoration: none;
      text-underline-offset: 3px;
    }

    a:hover,
    a:focus-visible {
      text-decoration: underline;
    }

    .seo-context {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <main>
    <h1>MARCO VARGAS</h1>

    <div class="details">
      <p>Architect</p>
      <p>Portugal</p>
      <p class="contact">
        <a href="mailto:mail@marcovargas.pt">mail@marcovargas.pt</a>
      </p>
    </div>

    <div class="seo-context">
      Marco Vargas is an architect based in Portugal. His work includes Villa Mater: a House in Azores.
    </div>
  </main>
</body>
</html>
