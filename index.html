<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Marco Vargas</title>
  <meta name="description" content="Marco Vargas is an architect based in Portugal." />
  <meta name="keywords" content="Marco Vargas, architect, architecture, Portugal, Villa Mater: a house in Azores, Álvaro Siza Vieira, Peter Zumthor, Valerio Olgiati, Kazuo Shinohara, SANAA, Ebejer Bonnici, Patricia da Silva, Ryue Nishizawa, Go Hasegawa, Tomoaki Uno, Junya Ishigami." />
  <meta name="author" content="Marco Vargas" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.marcovargas.pt/" />

  <!-- Open Graph -->
  <meta property="og:type" content="profile" />
  <meta property="og:title" content="Marco Vargas" />
  <meta property="og:description" content="Marco Vargas is an architect based in Portugal." />
  <meta property="og:url" content="https://www.marcovargas.pt/" />
  <meta property="og:locale" content="pt_PT" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Marco Vargas",
    "jobTitle": "Arquitecto",
    "url": "https://www.marcovargas.pt",
    "email": "mail@marcovargas.pt"
  }
  </script>

  <style>
    @font-face {
      font-family: 'Nimbus Roman No9 L';
      src:
        local('Nimbus Roman No9 L Regular'),
        local('Nimbus Roman No9 L'),
        url('./NimbusRomNo9L-Reg.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      background: #050505;
      color: #f1eee8;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(28px, 6vw, 48px);
      font-family: 'Nimbus Roman No9 L', 'Times New Roman', Times, serif;
      font-size: 17px;
      line-height: 1.38;
      font-weight: 400;
    }

    main {
      width: min(100%, 420px);
      text-align: center;
      transform: translateY(clamp(-56px, -4vh, -28px));
    }

    h1,
    p {
      font-size: inherit;
      line-height: inherit;
      font-weight: 400;
      color: inherit;
    }

    .details {
      display: grid;
      gap: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .seo-context {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <main>
    <h1>Marco Vargas</h1>

    <div class="details">
      <p>Arquitecto</p>

      <p class="contact">
        <a href="mailto:mail@marcovargas.pt">mail@marcovargas.pt</a>
      </p>
    </div>

    <div class="seo-context">
      Marco Vargas is an architect based in Portugal. His work includes Villa Mater: a House in Azores.
    </div>
  </main>
</body>
</html>
